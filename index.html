<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Te Amo 💖</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background: linear-gradient(135deg, #ff9a9e, #fad0c4);
            font-family: Arial, sans-serif;
        }

        .container {
            position: relative;
            width: 100vw;
            height: 100vh;
        }

        .teamo {
            position: absolute;
            color: white;
            font-size: 20px;
            animation: flotar 6s linear infinite;
            opacity: 0.8;
        }

        @keyframes flotar {
            0% {
                transform: translateY(100vh) scale(0.5);
                opacity: 0;
            }
            50% {
                opacity: 1;
            }
            100% {
                transform: translateY(-10vh) scale(1.2);
                opacity: 0;
            }
        }

        h1 {
            position: absolute;
            width: 100%;
            text-align: center;
            top: 40%;
            font-size: 60px;
            color: white;
            text-shadow: 0 0 20px rgba(0,0,0,0.3);
        }
    </style>
</head>
<body>

<div class="container" id="container">
    <h1>TE AMO 💖</h1>
</div>

<script>
    const container = document.getElementById("container");

    function crearTeAmo() {
        const span = document.createElement("span");
        span.classList.add("teamo");
        span.innerText = "te amo 💕";

        span.style.left = Math.random() * 100 + "vw";
        span.style.fontSize = (Math.random() * 20 + 15) + "px";
        span.style.animationDuration = (Math.random() * 3 + 3) + "s";

        container.appendChild(span);

        setTimeout(() => {
            span.remove();
        }, 6000);
    }

    setInterval(crearTeAmo, 100);
</script>

</body>
</html>
